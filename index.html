<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ================================================================
//  CONFIG — SUPABASE DATABASE
// ================================================================
const ADMIN_PASSWORD = 'Culture-Bridge-2026!';

const SUPABASE_URL = 'https://hlumjerbydfoximmyefk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-X03dN1H2wJebzU-dk0v4g_i6ktMfmc';

// Initialize Supabase
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================================================================
//  CATEGORY HELPERS
// ================================================================
const CAT_COLOR={Religion:'#b8922a',Food:'#c85a2a',Customs:'#4a6741',Celebrations:'#2a4a8a',Clothing:'#7a3a8a',Language:'#8a4a2a'};
const CAT_BG={Religion:'#f5e6c0',Food:'#fde8d8',Customs:'#d8e8d0',Celebrations:'#d0daf5',Clothing:'#ecd8f5',Language:'#f5dac8'};
const CAT_TEXT={Religion:'#6a4a10',Food:'#7a2e0e',Customs:'#2a4a22',Celebrations:'#1a2e5a',Clothing:'#4a1a5a',Language:'#4a2010'};
const CAT_CLASS={Religion:'cat-religion',Food:'cat-food',Customs:'cat-customs',Celebrations:'cat-celebrations',Clothing:'cat-clothing',Language:'cat-language'};
const REL_COLORS=['#b8922a','#c85a2a','#4a6741','#2a4a8a','#7a3a8a','#8a4a2a','#3a7a8a','#6a3a2a'];

// ================================================================
//  STATE
// ================================================================
let entries=[],pendingEntries=[],accessRequests=[];
let isAdmin=false,currentFilter='All',currentReligionFilter='All';
let pendingImageData='';

// ================================================================
//  DATABASE LOADING & SAVING (SUPABASE)
// ================================================================
async function loadData(isAdminRefresh=false) {
  try {
    const { data, error } = await supabaseClient
      .from('wiki_data')
      .select('content')
      .eq('id', 1)
      .single();
      
    if (error) throw error;

    if (data && data.content) {
      entries = data.content.entries || [];
      pendingEntries = data.content.pending || [];
      accessRequests = data.content.access || [];
    }
  } catch(e) {
    console.error('Database load error:', e);
    showToast('Could not load data. Check your connection.');
  } finally {
    hideLoader();
    refreshUI();
    if(isAdminRefresh) renderAdminPanel();
  }
}

async function saveData() {
  try {
    const payload = {
      entries: entries,
      pending: pendingEntries,
      access: accessRequests
    };

    const { error } = await supabaseClient
      .from('wiki_data')
      .update({ content: payload })
      .eq('id', 1);

    if (error) throw error;
  } catch(e) {
    console.error('Database save error:', e);
    showToast('Could not save data. Please try again.');
    throw e;
  }
}

function hideLoader() {
  const o=document.getElementById('loadingOverlay');
  if(o) { o.classList.add('hidden'); setTimeout(()=>o.style.display='none',400); }
}
function refreshUI(){renderStats();renderSidebar();filterEntries();}

// ================================================================
//  UTILITY
// ================================================================
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function closeModal(id){document.getElementById(id).style.display='none';}
function overlayClose(e,id){if(e.target===e.currentTarget)closeModal(id);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function scrollToWiki(){document.getElementById('wikiTop').scrollIntoView({behavior:'smooth'});}

// ================================================================
//  STATS + SIDEBAR
// ================================================================
function renderStats(){
  const pub=entries.filter(e=>e.status==='published');
  document.getElementById('stat-entries').textContent=pub.length;
  document.getElementById('stat-religions').textContent=[...new Set(pub.map(e=>e.religion))].length;
  document.getElementById('stat-contributors').textContent=[...new Set(pub.map(e=>e.author))].length;
}
function renderSidebar(){
  const pub=entries.filter(e=>e.status==='published');
  const religions=[...new Set(pub.map(e=>e.religion))];
  const sb=document.getElementById('religionSidebar');
  let html=`<button class="sidebar-link ${currentReligionFilter==='All'?'active':''}" onclick="setSidebarFilter('All',this)"><span class="dot" style="background:#888"></span>All religions<span class="sidebar-count">${pub.length}</span></button>`;
  religions.forEach((r,i)=>{
    const count=pub.filter(e=>e.religion===r).length;
    const col=REL_COLORS[i%REL_COLORS.length];
    const safe=r.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html+=`<button class="sidebar-link ${currentReligionFilter===r?'active':''}" onclick="setSidebarFilter('${safe}',this)"><span class="dot" style="background:${col}"></span>${escHtml(r)}<span class="sidebar-count">${count}</span></button>`;
  });
  sb.innerHTML=html;
}
function setSidebarFilter(val,el){
  currentReligionFilter=val;currentFilter='All';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
  document.getElementById('searchBox').value='';
  renderSidebar();filterEntries();
}
function setFilter(val,el){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');currentFilter=val;currentReligionFilter='All';
  renderSidebar();filterEntries();
}

// ================================================================
//  GRID + DETAIL
// ================================================================
function filterEntries(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const pub=entries.filter(e=>e.status==='published');
  const filtered=pub.filter(e=>{
    const matchQ=!q||(e.title+e.religion+e.desc+(e.tags||[]).join('')).toLowerCase().includes(q);
    const matchCat=currentFilter==='All'||e.category===currentFilter;
    const matchRel=currentReligionFilter==='All'||e.religion===currentReligionFilter;
    return matchQ&&matchCat&&matchRel;
  });
  renderGrid(filtered);
}
function renderGrid(list){
  const grid=document.getElementById('wikiGrid'),empty=document.getElementById('wikiEmpty');
  if(!list)list=entries.filter(e=>e.status==='published');
  if(list.length===0){grid.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(e=>`
    <div class="entry-card ${CAT_CLASS[e.category]||'cat-religion'}" onclick="showEntry(${e.id})">
      ${e.image?`<img class="entry-thumb" src="${e.image}" alt="${escHtml(e.title)}">`:''}
      <div class="entry-header">
        <div class="entry-title">${escHtml(e.title)}</div>
        <span class="entry-badge badge-pill" style="background:${CAT_BG[e.category]||'#f5e6c0'};color:${CAT_TEXT[e.category]||'#6a4a10'}">${escHtml(e.category)}</span>
      </div>
      <div class="entry-rel">${escHtml(e.religion)}</div>
      <div class="entry-desc">${escHtml(e.desc)}</div>
      <div class="entry-meta"><span>✍ ${escHtml(e.author)}</span><span>· ${escHtml(e.year)}</span><span>· ${escHtml(e.date)}</span></div>
    </div>`).join('');
}
function showEntry(id){const e=entries.find(x=>x.id===id);if(!e)return;_populateDetail(e,false);showPage('detail');}
function _populateDetail(e,isPending){
  document.getElementById('detailBar').style.background=CAT_COLOR[e.category]||'#b8922a';
  document.getElementById('detailRel').textContent=e.religion+(isPending?'  [PENDING]':'');
  document.getElementById('detailTitle').textContent=e.title;
  document.getElementById('detailSub').textContent=e.desc;
  document.getElementById('detailTags').innerHTML=(e.tags||[]).map(t=>`<span class="detail-tag">${escHtml(t)}</span>`).join('');
  const imgEl=document.getElementById('detailImg');
  if(e.image){imgEl.src=e.image;imgEl.style.display='block';}else{imgEl.style.display='none';imgEl.src='';}
  document.getElementById('detailBody').innerHTML=(e.body||'').split('\n\n').map(p=>`<p>${escHtml(p)}</p>`).join('');
  document.getElementById('metaAuthor').textContent=e.author;
  document.getElementById('metaYear').textContent=e.year;
  document.getElementById('metaCat').textContent=e.category;
  document.getElementById('metaDate').textContent=isPending?'Pending review':e.date;
  document.getElementById('detailBackBtn').onclick=isPending?()=>showPage('admin'):()=>showPage('home');
}

// ================================================================
//  ADMIN AUTH
// ================================================================
function openAdminLogin(){document.getElementById('adminPwInput').value='';document.getElementById('adminPwError').style.display='none';document.getElementById('adminLoginModal').style.display='flex';setTimeout(()=>document.getElementById('adminPwInput').focus(),100);}
function checkAdminPw(){
  if(document.getElementById('adminPwInput').value===ADMIN_PASSWORD){
    isAdmin=true; closeModal('adminLoginModal'); showPage('admin'); loadData(true); 
  } else {
    document.getElementById('adminPwError').style.display='block';
  }
}
function logoutAdmin(){isAdmin=false;showPage('home');}
function switchAdminTab(tab,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('.admin-tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

// ================================================================
//  ADMIN RENDER
// ================================================================
function renderAdminPanel(){
  document.getElementById('pendingCount').textContent=pendingEntries.length||'';
  const pl=document.getElementById('pendingList'),pe=document.getElementById('pendingEmpty');
  if(pendingEntries.length===0){pl.innerHTML='';pe.style.display='';}
  else{
    pe.style.display='none';
    pl.innerHTML=pendingEntries.map(e=>`
      <div class="pcard" id="pcard-${e.id}">
        ${e.image?`<img class="pcard-img" src="${e.image}" alt="${escHtml(e.title)}">`:''}
        <h4>${escHtml(e.title)} <span class="pending-badge">● Pending</span></h4>
        <div class="pmeta">${escHtml(e.religion)} · ${escHtml(e.category)} · ${escHtml(e.author)} (${escHtml(e.year)}) · ${escHtml(e.date)}</div>
        <div class="pbody">${escHtml((e.body||'').substring(0,240))}…</div>
        <div class="pcard-actions">
          <button class="btn btn-sage" onclick="approveEntry(${e.id})">✓ Approve &amp; publish live</button>
          <button class="btn btn-danger" onclick="rejectEntry(${e.id})">✕ Reject</button>
          <button class="btn btn-outline" onclick="previewPending(${e.id})">Preview</button>
        </div>
      </div>`).join('');
  }
  const pub=entries.filter(e=>e.status==='published');
  const pubList=document.getElementById('publishedList'),pubEmpty=document.getElementById('publishedEmpty');
  if(pub.length===0){pubList.innerHTML='';pubEmpty.style.display='';}
  else{
    pubEmpty.style.display='none';
    pubList.innerHTML=pub.map(e=>`
      <div class="pcard">
        <h4>${escHtml(e.title)} <span class="live-badge">● Live</span></h4>
        <div class="pmeta">${escHtml(e.religion)} · ${escHtml(e.category)} · ${escHtml(e.author)} · ${escHtml(e.date)}</div>
        <div class="pbody">${escHtml(e.desc)}</div>
        <div class="pcard-actions">
          <button class="btn btn-outline" onclick="previewPublished(${e.id})">View</button>
          <button class="btn btn-danger" onclick="removeEntry(${e.id})">Remove from site</button>
        </div>
      </div>`).join('');
  }
  document.getElementById('accessCount').textContent=accessRequests.length||'';
  const al=document.getElementById('accessList'),ae=document.getElementById('accessEmpty');
  if(accessRequests.length===0){al.innerHTML='';ae.style.display='';}
  else{
    ae.style.display='none';
    al.innerHTML=accessRequests.map(r=>`
      <div class="acard" id="acard-${r.id}">
        <div class="ainfo">
          <div class="aname">${escHtml(r.name)}</div>
          <div class="ameta">${escHtml(r.year)} · ${escHtml(r.email)}</div>
          <div class="ameta">Wants to write about: <strong>${escHtml(r.culture)}</strong></div>
          <div class="ameta" style="font-style:italic">"${escHtml(r.reason)}"</div>
          <div class="ameta">Submitted: ${escHtml(r.date)}</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-self:flex-start">
          <button class="btn btn-sage" onclick="approveAccess(${r.id})">Approve</button>
          <button class="btn btn-danger" onclick="denyAccess(${r.id})">Deny</button>
        </div>
      </div>`).join('');
  }
}

// ================================================================
//  ADMIN ACTIONS
// ================================================================
async function approveEntry(id){
  const idx=pendingEntries.findIndex(e=>e.id===id);if(idx===-1)return;
  const btn=event.target;btn.textContent='Publishing…';btn.disabled=true;
  const e=pendingEntries.splice(idx,1)[0];
  e.status='published';e.date=new Date().toLocaleString('default',{month:'long',year:'numeric'});
  entries.push(e);
  try{await saveData();renderAdminPanel();refreshUI();showToast('✅ Entry is now LIVE!');}
  catch(err){pendingEntries.push(e);entries.pop();renderAdminPanel();btn.textContent='✓ Approve & publish live';btn.disabled=false;}
}
async function rejectEntry(id){
  pendingEntries=pendingEntries.filter(e=>e.id!==id);
  try{await saveData();renderAdminPanel();showToast('Entry rejected.');}catch(err){}
}
function previewPending(id){const e=pendingEntries.find(x=>x.id===id);if(!e)return;_populateDetail(e,true);showPage('detail');}
function previewPublished(id){const e=entries.find(x=>x.id===id);if(!e)return;_populateDetail(e,false);document.getElementById('detailBackBtn').onclick=()=>showPage('admin');showPage('detail');}
async function removeEntry(id){
  if(!confirm('Remove this entry? This cannot be undone.'))return;
  entries=entries.filter(e=>e.id!==id);
  try{await saveData();renderAdminPanel();refreshUI();showToast('Entry removed.');}catch(err){}
}
async function approveAccess(id){
  accessRequests=accessRequests.filter(r=>r.id!==id);
  try{await saveData();renderAdminPanel();showToast('✅ Access approved!');}catch(err){}
}
async function denyAccess(id){
  accessRequests=accessRequests.filter(r=>r.id!==id);
  try{await saveData();renderAdminPanel();showToast('Access denied.');}catch(err){}
}

// ================================================================
//  REQUEST ACCESS
// ================================================================
function openRequestAccess(){document.getElementById('requestAccessModal').style.display='flex';}
async function submitAccessRequest(){
  const name=document.getElementById('reqName').value.trim();
  const year=document.getElementById('reqYear').value;
  const email=document.getElementById('reqEmail').value.trim();
  const culture=document.getElementById('reqCulture').value.trim();
  const reason=document.getElementById('reqReason').value.trim();
  const agree=document.getElementById('reqAgree').checked;
  if(!name||!year||!email||!culture||!reason){showToast('Please fill in all fields.');return;}
  if(!agree){showToast('Please agree to the plagiarism policy.');return;}
  accessRequests.push({id:Date.now(),name,year,email,culture,reason,date:new Date().toLocaleString('default',{month:'long',year:'numeric'})});
  try{
    await saveData();
    closeModal('requestAccessModal');
    ['reqName','reqEmail','reqCulture','reqReason'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('reqYear').selectedIndex=0;document.getElementById('reqAgree').checked=false;
    showToast('✅ Request submitted!');
  }catch(err){showToast('Could not submit. Please try again.');}
}

// ================================================================
//  SUBMIT ENTRY
// ================================================================
function openSubmitEntry(){setFormMode('builtin');document.getElementById('submitEntryModal').style.display='flex';}
function setFormMode(mode){
  const btnB=document.getElementById('toggleBuiltin'),btnG=document.getElementById('toggleGform');
  if(mode==='builtin'){
    document.getElementById('builtinForm').style.display='';document.getElementById('gformEmbed').style.display='none';
    btnB.style.background='var(--ink)';btnB.style.color='#fff';btnG.style.background='var(--surface2)';btnG.style.color='var(--ink2)';
  }else{
    document.getElementById('builtinForm').style.display='none';document.getElementById('gformEmbed').style.display='';
    btnG.style.background='var(--ink)';btnG.style.color='#fff';btnB.style.background='var(--surface2)';btnB.style.color='var(--ink2)';
  }
}
async function submitEntry(){
  const name=document.getElementById('entName').value.trim();
  const year=document.getElementById('entYear').value;
  const religion=document.getElementById('entReligion').value.trim();
  const category=document.getElementById('entCategory').value;
  const title=document.getElementById('entTitle').value.trim();
  const desc=document.getElementById('entDesc').value.trim();
  const body=document.getElementById('entBody').value.trim();
  const tags=document.getElementById('entTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!name||!religion||!title||!desc||!body){showToast('Please fill in all required fields.');return;}
  const btn=document.getElementById('submitBtn');btn.textContent='Submitting…';btn.disabled=true;
  pendingEntries.push({id:Date.now(),title,religion,category,desc,body,tags,author:name,year,date:new Date().toLocaleString('default',{month:'long',year:'numeric'}),status:'pending',image:pendingImageData});
  try{
    await saveData();
    closeModal('submitEntryModal');
    ['entName','entReligion','entTitle','entDesc','entBody','entTags'].forEach(id=>document.getElementById(id).value='');
    removeImage(null);showToast('✅ Submitted! Waiting for admin review.');
    if(isAdmin)renderAdminPanel();
  }catch(err){pendingEntries.pop();showToast('Could not submit. Please try again.');}
  finally{btn.textContent='Submit for review →';btn.disabled=false;}
}

// ================================================================
//  IMAGE UPLOAD
// ================================================================
function handleImageUpload(event){
  const file=event.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){showToast('Image too large. Max 2 MB.');event.target.value='';return;}
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImageData=e.target.result;
    document.getElementById('entImagePreview').src=pendingImageData;
    document.getElementById('uploadPrompt').style.display='none';
    document.getElementById('uploadPreviewWrap').style.display='block';
  };
  reader.readAsDataURL(file);
}
function removeImage(event){
  if(event)event.stopPropagation();
  pendingImageData='';
  document.getElementById('entImagePreview').src='';
  document.getElementById('entImageFile').value='';
  document.getElementById('uploadPrompt').style.display='';
  document.getElementById('uploadPreviewWrap').style.display='none';
}
const uploadZone=document.getElementById('uploadZone');
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{
  e.preventDefault();uploadZone.classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('image/'))handleImageUpload({target:{files:e.dataTransfer.files}});
});

// ================================================================
//  BOOT
// ================================================================
loadData();
</script>
</body>
</html>
