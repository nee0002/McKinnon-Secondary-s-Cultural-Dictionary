<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CultureWiki — By Students, For Students</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4ef;--surface:#fff;--surface2:#f0ece4;
  --ink:#1a1612;--ink2:#5c5448;--ink3:#9c9080;
  --accent:#c85a2a;--accent2:#e8956a;
  --gold:#b8922a;--gold-light:#f5e6c0;
  --sage:#4a6741;
  --border:rgba(26,22,18,0.1);--border2:rgba(26,22,18,0.2);
  --shadow:0 2px 16px rgba(26,22,18,0.08);--radius:10px;
}
*{font-family:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.nav{position:sticky;top:0;z-index:200;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px}
.nav-logo{font-family:'DM Serif Display',serif;color:#fff;font-size:1.25rem;display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);display:inline-block}
.nav-actions{display:flex;gap:8px;align-items:center}
.btn{font-size:0.82rem;font-weight:500;padding:7px 16px;border-radius:6px;cursor:pointer;border:none;transition:all 0.18s}
.btn-ghost{background:rgba(255,255,255,0.1);color:#fff}.btn-ghost:hover{background:rgba(255,255,255,0.2)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#b04a1e}
.btn-outline{background:transparent;color:var(--ink);border:1px solid var(--border2)}.btn-outline:hover{background:var(--surface2)}
.btn-sage{background:var(--sage);color:#fff}.btn-sage:hover{background:#3a5631}
.btn-danger{background:#fde8d8;color:#7a2e0e;border:none}.btn-danger:hover{background:#f5c8b0}
.page{display:none;animation:fadeUp 0.3s ease}.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{background:var(--ink);padding:5rem 2rem 4rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(200,90,42,0.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(42,74,138,0.15) 0%,transparent 55%),radial-gradient(ellipse at 60% 80%,rgba(74,103,65,0.12) 0%,transparent 50%)}
.hero-inner{position:relative;z-index:1;max-width:680px;margin:0 auto}
.hero-badge{display:inline-block;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--accent2);font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:1.5rem}
.hero h1{font-family:'DM Serif Display',serif;font-size:3.2rem;color:#fff;line-height:1.15;margin-bottom:1rem}
.hero h1 em{color:var(--accent2);font-style:italic}
.hero p{color:rgba(255,255,255,0.6);font-size:1.05rem;font-weight:300;margin-bottom:2rem;line-height:1.7}
.hero-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:2rem;justify-content:center;margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,0.08)}
.stat{text-align:center}
.stat-num{font-family:'DM Serif Display',serif;font-size:1.8rem;color:#fff}
.stat-label{font-size:0.75rem;color:rgba(255,255,255,0.4);letter-spacing:0.06em;text-transform:uppercase}
.search-wrap{background:var(--surface2);border-bottom:1px solid var(--border);padding:1rem 2rem}
.search-inner{max-width:960px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;padding:10px 16px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);font-size:0.95rem;color:var(--ink);outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{background:var(--surface);border:1px solid var(--border2);color:var(--ink2);font-size:0.8rem;padding:8px 14px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.filter-btn.active,.filter-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.main-layout{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;display:grid;grid-template-columns:220px 1fr;gap:2rem}
@media(max-width:700px){.main-layout{grid-template-columns:1fr}}
.sidebar-section{margin-bottom:1.5rem}
.sidebar-title{font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.6rem}
.sidebar-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:0.88rem;color:var(--ink2);cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left}
.sidebar-link:hover,.sidebar-link.active{background:var(--surface2);color:var(--ink)}
.sidebar-link .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-count{margin-left:auto;font-size:0.72rem;background:var(--surface2);padding:1px 7px;border-radius:10px;color:var(--ink3)}
.wiki-grid{display:grid;gap:1rem}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.4rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.entry-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat-color,var(--accent));border-radius:3px 0 0 3px}
.entry-card:hover{box-shadow:var(--shadow);border-color:var(--border2);transform:translateX(2px)}
.entry-thumb{width:100%;height:140px;object-fit:cover;border-radius:6px;margin-bottom:0.75rem;display:block}
.entry-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:0.4rem}
.entry-title{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--ink)}
.entry-badge{font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.entry-rel{font-size:0.76rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.35rem}
